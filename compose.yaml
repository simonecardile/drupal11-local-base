services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./:/var/www/html
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
    depends_on:
      - mysql
    networks:
      - drupal_net

  nginx:
    image: nginx:alpine
    depends_on:
      - php
    ports:
      - "${NGINX_HOST_PORT}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - drupal_net

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - drupal_net

  adminer:
    image: adminer
    depends_on:
      - mysql
    ports:
      - "${ADMINER_HOST_PORT}:8080"
    networks:
      - drupal_net

  composer:
    image: composer:2
    working_dir: /app
    volumes:
      - ./:/app
    profiles:
      - tools

volumes:
  mysql_data:

networks:
  drupal_net:
    driver: bridge
